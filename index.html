<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mimic 英语跟读练习</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Daily shadowing studio</p>
        <h1>Mimic 跟读练习</h1>
      </div>
      <nav class="tabs" aria-label="练习板块">
        <button class="tab active" data-target="english">英语视频</button>
        <button class="tab" data-target="chinese">中文朗读</button>
        <button class="tab" data-target="coding">Coding</button>
        <button class="tab" data-target="insight">Insight</button>
      </nav>
    </header>

    <main>
      <section class="calendar-panel" aria-label="练习日历">
        <div class="calendar-head">
          <button id="prevMonth" class="icon-button light" aria-label="上个月">‹</button>
          <div>
            <p class="eyebrow">Practice calendar</p>
            <h2 id="calendarTitle"></h2>
          </div>
          <button id="nextMonth" class="icon-button light" aria-label="下个月">›</button>
        </div>
        <div class="weekday-row" aria-hidden="true">
          <span>一</span>
          <span>二</span>
          <span>三</span>
          <span>四</span>
          <span>五</span>
          <span>六</span>
          <span>日</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section id="english" class="panel active">
        <div class="practice-grid">
          <section class="video-column" aria-label="每日英语视频">
            <div class="section-head">
              <div>
                <p class="eyebrow" id="englishDate"></p>
                <h2 id="englishTitle"></h2>
              </div>
              <button id="openVideoStudio" class="primary">全屏跟读</button>
            </div>
            <video id="sourceVideo" controls playsinline crossorigin="anonymous"></video>
            <p class="source-line" id="englishSource"></p>
          </section>

          <aside class="study-column">
            <section>
              <div class="section-head compact">
                <h2>逐行字幕</h2>
                <button id="replayLine" class="ghost">播放当前句</button>
              </div>
              <div id="subtitleList" class="subtitle-list"></div>
            </section>

            <section>
              <h2>重点词</h2>
              <div id="wordList" class="word-list"></div>
            </section>
          </aside>
        </div>
      </section>

      <section id="chinese" class="panel">
        <section class="reading-main">
          <div class="section-head">
            <div>
              <p class="eyebrow" id="readingDate"></p>
              <h2 id="readingTitle"></h2>
            </div>
            <button id="openReadingStudio" class="primary">朗读录制</button>
          </div>
          <article id="readingText" class="reading-text"></article>
        </section>
      </section>

      <section id="coding" class="panel">
        <div class="coding-layout">
          <section class="coding-main">
            <div class="section-head">
              <div>
                <p class="eyebrow" id="codingDate"></p>
                <h2 id="codingTitle"></h2>
              </div>
              <a id="codingSource" class="button-link" href="#" target="_blank" rel="noreferrer">打开题目</a>
            </div>
            <div id="problemList" class="problem-list"></div>
            <textarea id="codeEditor" class="code-editor" spellcheck="false"></textarea>
            <div class="studio-controls coding-controls">
              <button id="checkSyntax" class="secondary">语法检查</button>
              <button id="submitCode" class="primary">提交判定</button>
              <button id="nextHint" class="ghost">下一步提示</button>
            </div>
            <div id="judgeOutput" class="judge-output"></div>
          </section>

          <aside class="study-column">
            <section>
              <h2>API Key</h2>
              <p class="source-line">可选。当前先做本地语法和结构检查；接入后端或模型后可用于更细的错误解析。</p>
              <input id="apiKeyInput" class="api-key-input" type="password" placeholder="sk-..." autocomplete="off" />
            </section>
            <section>
              <h2>动态提示</h2>
              <div id="hintList" class="hint-list"></div>
            </section>
            <section>
              <div class="section-head compact">
                <h2>错题本</h2>
                <button id="clearWrongBook" class="danger ghost">清空</button>
              </div>
              <div id="wrongBookList" class="favorite-list empty">暂无错题</div>
            </section>
          </aside>
        </div>
      </section>

      <section id="insight" class="panel">
        <div class="insight-layout">
          <section class="insight-main">
            <div class="section-head">
              <div>
                <p class="eyebrow" id="insightDate"></p>
                <h2>交叉学科 Insight</h2>
              </div>
            </div>
            <div id="insightList" class="insight-list"></div>
          </section>

          <aside class="study-column">
            <section>
              <h2>我的收藏</h2>
              <div id="favoriteInsightList" class="favorite-list empty">暂无收藏</div>
            </section>
          </aside>
        </div>
      </section>

      <section class="library">
        <div class="section-head">
          <div>
            <p class="eyebrow">Recordings</p>
            <h2>我的录制</h2>
          </div>
          <button id="clearRecordings" class="danger ghost">全部删除</button>
        </div>
        <div id="recordingList" class="recording-list empty">暂无录制</div>
      </section>
    </main>

    <div id="studio" class="studio" aria-hidden="true">
      <div class="studio-shell">
        <div class="studio-bar">
          <div>
            <p class="eyebrow" id="studioMode">Video shadowing</p>
            <h2 id="studioTitle"></h2>
          </div>
          <button id="closeStudio" class="icon-button" aria-label="关闭">×</button>
        </div>

        <div class="phone-frame">
          <div class="notch"></div>
          <canvas id="compositeCanvas" width="1170" height="2532"></canvas>
          <div class="camera-permission" id="cameraHint">点击“打开摄像头”开始预览</div>
        </div>

        <div class="studio-controls">
          <button id="enableCamera" class="secondary">打开摄像头</button>
          <button id="startRecording" class="primary" disabled>开始录制</button>
          <button id="stopRecording" class="danger" disabled>停止</button>
        </div>
      </div>
    </div>

    <video id="cameraVideo" playsinline muted hidden></video>
    <script src="./app.js"></script>
  </body>
</html>
