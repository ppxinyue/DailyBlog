<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mimic Daily Todo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="todo-grid" aria-label="每日任务">
      <section class="todo-card">
        <h1>英文跟读</h1>
        <a href="https://shadowingenglish.com/practice" target="_blank" rel="noreferrer">ShadowingEnglish</a>
        <textarea data-note="english" placeholder="每日学习感受"></textarea>
      </section>

      <section class="todo-card">
        <h1>中文阅读</h1>
        <a href="https://meiriyiwen.com/" target="_blank" rel="noreferrer">每日一文</a>
        <textarea data-note="chinese" placeholder="每日学习感受"></textarea>
      </section>

      <section class="todo-card">
        <h1>Coding</h1>
        <div class="link-row">
          <a href="https://neetcode.io/roadmap" target="_blank" rel="noreferrer">NeetCode</a>
          <a href="https://www.hellointerview.com/practice" target="_blank" rel="noreferrer">Hello Interview</a>
        </div>
        <textarea data-note="coding" placeholder="每日学习感受"></textarea>
      </section>

      <section class="todo-card">
        <h1>Insight</h1>
        <p class="insight-subtitle">AI + Cognitive Neuroscience, Neurodiversity, Mental Health, Developmental Psychology, Social Simulation, Children, Education</p>
        <div id="insightChannels" class="channel-list"></div>
        <div id="insightList" class="insight-list"></div>
        <textarea data-note="insight" placeholder="每日学习感受"></textarea>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
