<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mimic Daily Todo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="page-header">
      <div class="view-switch" aria-label="页面切换">
        <button type="button" data-app-view="todo" class="is-active">Todo</button>
        <button type="button" data-app-view="blog">Blog</button>
      </div>
      <h1 id="pageTitle">Daily Todo</h1>
    </header>
    <main id="todoView" class="todo-grid app-view" aria-label="每日任务">
      <section class="overview-card" aria-label="日历和统计">
        <div id="calendar" class="calendar"></div>
        <div id="dailyStats" class="daily-stats"></div>
      </section>

      <section class="todo-card">
        <h2>Insight</h2>
        <p class="insight-subtitle">AI + Cognitive Neuroscience, Neurodiversity, Mental Health, Developmental Psychology, Social Simulation, Children, Education</p>
        <div id="insightChannels" class="channel-list"></div>
        <div class="insight-actions">
          <button type="button" data-insight-view="history">History</button>
          <button type="button" data-insight-view="saved">Saved</button>
          <button type="button" id="moreInsightButton">More</button>
        </div>
        <div id="insightList" class="insight-list"></div>
        <textarea data-note="insight" placeholder="write something"></textarea>
      </section>

      <section class="todo-card">
        <div class="card-heading">
          <h2>英文跟读</h2>
          <label class="complete-check" aria-label="英文跟读完成">
            <input type="checkbox" data-complete="english" />
          </label>
        </div>
        <a href="https://shadowingenglish.com/practice" target="_blank" rel="noreferrer">ShadowingEnglish</a>
        <textarea data-note="english" placeholder="write something"></textarea>
      </section>

      <section class="todo-card">
        <div class="card-heading">
          <h2>中文阅读</h2>
          <label class="complete-check" aria-label="中文阅读完成">
            <input type="checkbox" data-complete="chinese" />
          </label>
        </div>
        <a href="https://meiriyiwen.com/" target="_blank" rel="noreferrer">每日一文</a>
        <textarea data-note="chinese" placeholder="write something"></textarea>
      </section>

      <section class="todo-card">
        <div class="card-heading">
          <h2>Coding</h2>
          <label class="complete-check" aria-label="Coding 完成">
            <input type="checkbox" data-complete="coding" />
          </label>
        </div>
        <div class="link-row">
          <a href="https://neetcode.io/roadmap" target="_blank" rel="noreferrer">NeetCode</a>
          <a href="https://www.hellointerview.com/practice" target="_blank" rel="noreferrer">Hello Interview</a>
        </div>
        <textarea data-note="coding" placeholder="write something"></textarea>
      </section>
    </main>

    <main id="blogView" class="blog-view app-view" aria-label="Blog" hidden>
      <section class="blog-editor">
        <div class="blog-poster-hero" aria-hidden="true">
          <svg class="blog-brain-graphic" viewBox="0 0 220 180" role="img">
            <path d="M70 88c-18-3-29-16-28-35 2-23 24-39 45-31 8-15 31-19 46-7 13-8 34-3 43 12 14 3 24 16 23 31 0 15-10 28-24 33 1 17-12 32-29 34-10 22-43 24-57 5-18 4-37-9-39-28-12-2-21-12-22-24-1-15 9-27 24-30" />
            <path d="M78 48c13 5 20 15 21 30m34-49c-10 12-10 25 0 38m-57 57c9-8 20-10 33-5m31-21c19-5 31 0 37 15m-87-37c14-4 27-1 38 9" />
          </svg>
          <svg class="blog-ai-graphic" viewBox="0 0 180 180" role="img">
            <rect x="48" y="54" width="84" height="72" rx="20" />
            <path d="M70 86h1m38 0h1M75 106c10 8 20 8 30 0M90 54V34m-22 20-12-12m56 12 12-12M42 88H24m132 0h-18M63 126v18m54-18v18" />
            <circle cx="70" cy="86" r="5" />
            <circle cx="110" cy="86" r="5" />
          </svg>
        </div>
        <div class="blog-toolbar" aria-label="Blog text tools">
          <button type="button" data-blog-format="heading" data-level="1">H1</button>
          <button type="button" data-blog-format="heading" data-level="2">H2</button>
          <button type="button" data-blog-format="heading" data-level="3">H3</button>
          <button type="button" data-blog-format="bold">B</button>
          <button type="button" data-blog-format="strike">S</button>
          <button type="button" class="color-tool color-pink" data-blog-format="color" data-color="#d92d87" aria-label="Pink text"></button>
          <button type="button" class="color-tool color-blue" data-blog-format="color" data-color="#2563eb" aria-label="Blue text"></button>
          <button type="button" class="color-tool color-green" data-blog-format="color" data-color="#16803c" aria-label="Green text"></button>
        </div>
        <div class="blog-heading-fields">
          <div>
            <span id="blogDateLabel"></span>
            <span id="blogWeekdayLabel"></span>
          </div>
          <input id="blogTitle" type="text" placeholder="Title" />
        </div>
        <div id="blogEditor" class="blog-writing-surface" contenteditable="true" role="textbox" aria-multiline="true" data-placeholder="write blog"></div>
        <div class="blog-export-row">
          <button type="button" id="exportBlogPng">Export PNG</button>
          <button type="button" id="stashBlogDraft">Stash</button>
          <button type="button" id="saveBlogPost">Save</button>
          <span id="exportBlogStatus"></span>
          <span id="blogSaveStatus"></span>
          <span id="blogWordStats"></span>
        </div>
        <details class="blog-history">
          <summary>Past Blogs</summary>
          <div id="blogArchive" class="blog-archive"></div>
        </details>
      </section>
    </main>
    <script src="./app.js?v=20260527-blog-light"></script>
  </body>
</html>
